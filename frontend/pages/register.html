<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register - Reimbursement</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../css/global.css" />
        <link rel="stylesheet" href="../css/register.css" />
    </head>
    <body class="bg-light">
        <div class="container py-5">
            <div class="card section-card mx-auto" style="max-width: 800px">
                <div class="card-body p-4">
                    <h2 class="fw-bold">Company Registration</h2>
                    <p class="text-muted">3-step frontend demo setup</p>

                    <div class="d-flex gap-3 my-4">
                        <div class="step-pill active">1</div>
                        <div class="step-pill">2</div>
                        <div class="step-pill">3</div>
                    </div>

                    <div class="step-panel active">
                        <h5>Step 1: Company Details</h5>
                        <div class="mb-3">
                            <label class="form-label">Company Name</label>
                            <input
                                class="form-control"
                                placeholder="Enter company name"
                            />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Country</label>
                            <select class="form-select" id="country">
                                <option value="">Select country</option>
                            </select>
                        </div>
                        <div class="alert alert-info">
                            Detected Currency:
                            <strong id="currencyDisplay">N/A</strong>
                        </div>
                    </div>

                    <div class="step-panel">
                        <h5>Step 2: Admin User Details</h5>
                        <div class="mb-3">
                            <label class="form-label">Admin Name</label>
                            <input
                                class="form-control"
                                placeholder="Enter admin name"
                            />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Admin Email</label>
                            <input
                                type="email"
                                class="form-control"
                                placeholder="admin@company.com"
                            />
                        </div>
                    </div>

                    <div class="step-panel">
                        <h5>Step 3: Review & Finish</h5>
                        <p class="text-muted">
                            Review details and complete demo registration.
                        </p>
                        <div class="alert alert-success">
                            This is a frontend-only prototype. No real account
                            will be created.
                        </div>
                    </div>

                    <div class="mt-4 d-flex justify-content-between">
                        <button class="btn btn-outline-secondary" id="prevBtn">
                            Previous
                        </button>
                        <button class="btn btn-primary" id="nextBtn">
                            Next
                        </button>
                    </div>

                    <div class="mt-3">
                        <a href="login.html" class="text-decoration-none"
                            >Back to Login</a
                        >
                    </div>
                </div>
            </div>
        </div>

        <script src="../js/global.js"></script>
        <script src="../js/register.js"></script>
    </body>
</html>
