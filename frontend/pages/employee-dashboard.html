<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Employee Dashboard</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../css/global.css" />
        <link rel="stylesheet" href="../css/dashboard.css" />
    </head>
    <body>
        <div class="app-shell">
            <aside class="sidebar">
                <h4 class="fw-bold">Employee</h4>
                <nav class="nav flex-column mt-4">
                    <a class="nav-link active" href="#">Dashboard</a>
                    <a class="nav-link" href="../index.html">Home</a>
                </nav>
            </aside>

            <main class="content-area">
                <div class="dashboard-header">
                    <h2 class="fw-bold">Employee Dashboard</h2>
                    <p class="text-muted">
                        Submit expense claims and track history
                    </p>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <div class="card stat-card p-3">
                            <h6>Pending</h6>
                            <h3>3</h3>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card stat-card p-3">
                            <h6>Approved</h6>
                            <h3>8</h3>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card stat-card p-3">
                            <h6>Rejected</h6>
                            <h3>1</h3>
                        </div>
                    </div>
                </div>

                <div class="card section-card mb-4">
                    <div class="card-body">
                        <h5 class="fw-bold mb-3">Submit Expense</h5>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <input
                                    id="amount"
                                    type="number"
                                    class="form-control"
                                    placeholder="Amount"
                                />
                            </div>
                            <div class="col-md-4">
                                <select id="category" class="form-select">
                                    <option value="">Select Category</option>
                                    <option>Travel</option>
                                    <option>Food</option>
                                    <option>Supplies</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <input
                                    id="expenseDate"
                                    type="date"
                                    class="form-control"
                                />
                            </div>
                            <div class="col-12">
                                <textarea
                                    id="description"
                                    class="form-control"
                                    rows="3"
                                    placeholder="Description"
                                ></textarea>
                            </div>
                        </div>

                        <div class="mt-3">
                            <button class="btn btn-outline-primary" id="ocrBtn">
                                OCR Demo Auto Fill
                            </button>
                            <button
                                class="btn btn-primary"
                                id="submitExpenseBtn"
                            >
                                Submit Expense
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card section-card">
                    <div class="card-body">
                        <h5 class="fw-bold mb-3">Expense History</h5>
                        <div class="table-responsive">
                            <table class="table align-middle">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Amount</th>
                                        <th>Category</th>
                                        <th>Date</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="expenseTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <script src="../js/global.js"></script>
        <script src="../js/employee.js"></script>
    </body>
</html>
